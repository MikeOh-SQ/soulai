<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ADHD 체크 설문</title>
</head>
<body>

  <h2 id="title">부주의형 검사</h2>
  <p id="progress"></p>
  <p id="question"></p>

  <div id="buttons">
    <button onclick="answerQuestion('yes')">Yes</button>
    <button onclick="answerQuestion('no')">No</button>
  </div>

  <p id="result" style="margin-top:20px; font-weight:bold; white-space:pre-line;"></p>

  <script>
    const inattentionQuestions = [
      "1. 세부적인 면에 면밀한 주의를 기울이지 못하거나 학업, 직업, 다른 활동 등에서 부주의한 실수를 저지른다.",
      "2. 일이나 놀이를 할 때 지속적으로 주의를 집중할 수 없다.",
      "3. 다른 사람이 말을 할 때 경청하지 않는 것으로 보인다.",
      "4. 지시를 완수하지 못하고 학업, 잡일, 작업장에서의 임무를 수행하지 못한다. 이 때 임무를 수행하지 못하는 것은 반항하기 위해서나 지시를 이해하지 못해서가 아니다",
      "5. 과업과 활동을 체계화 하지 못한다",
      "6. 지속적으로 정신적인 노력을 요구하는 과업에 참여하기를 피하고 싫어하며 저항한다.",
      "7. 활동이나 숙제에 필요한 물건들을 잃어버린다.",
      "8. 외부의 자극에 의해 쉽게 산만해진다.",
      "9. 일상적인 활동을 잊어버린다."
    ];

    const hyperQuestions = [
      "1. 손발을 가만두지 못하거나 의자에 앉아서도 몸을 옴지락거린다.",
      "2. 앉아있어야 하는 교실이나 다른 상황에서 자리를 이탈한다.",
      "3. 상황에 부적절하게 지나치게 뛰어다니거나 기어오른다.",
      "4. 조용히 여가활동에 참여하거나 놀지 못한다.",
      "5. ‘끊임없이 활동하거나’ 마치 ‘무엇인가에 쫓기는 것’처럼 행동한다.",
      "6. 지나치게 수다스럽다",
      "7. 질문이 채 끝나기 전에 성급하게 대답한다.",
      "8. 차례를 기다리지 못한다.",
      "9. 다른 사람의 활동을 방해하고 간섭한다"
    ];

    let stage = "inattention";
    let currentIndex = 0;

    let inattentionYes = 0;
    let hyperYes = 0;

    function getCurrentQuestions() {
      return stage === "inattention" ? inattentionQuestions : hyperQuestions;
    }

    function showQuestion() {
      const questions = getCurrentQuestions();

      document.getElementById("question").textContent = questions[currentIndex];
      document.getElementById("progress").textContent =
        `${currentIndex + 1} / ${questions.length}`;

      document.getElementById("title").textContent =
        stage === "inattention" ? "부주의형 검사" : "과잉행동과 충동형 검사";
    }

    function answerQuestion(value) {
      if (stage === "inattention" && value === "yes") inattentionYes++;
      if (stage === "hyper" && value === "yes") hyperYes++;

      currentIndex++;

      const questions = getCurrentQuestions();

      if (currentIndex < questions.length) {
        showQuestion();
      } else {
        if (stage === "inattention") {
          stage = "hyper";
          currentIndex = 0;
          showQuestion();
        } else {
          showResult();
        }
      }
    }

    function showResult() {
      let resultText = "";

      // 🔥 결과별 문구 적용
      if (inattentionYes >= 6 && hyperYes >= 6) {
        resultText =
`결과를 보면, 집중과 관련된 어려움과 함께 에너지나 반응 속도와 관련된 특성이 함께 나타나고 있는 것으로 보입니다. 이는 드문 경우가 아니며, 많은 사람들이 비슷한 패턴을 경험합니다. 상황에 따라 집중이 어려워지기도 하고, 반대로 빠르게 반응하거나 행동하는 모습이 동시에 나타날 수 있습니다. 중요한 것은 “문제가 있다”기보다 나에게 어떤 환경과 방식이 더 잘 맞는지를 알아가는 과정입니다. 필요하다면 전문가와 함께 보다 구체적으로 이해해보는 것도 도움이 될 수 있습니다.`;
      } else if (inattentionYes >= 6) {
        resultText =
`결과를 보면, 최근에 집중이나 정리, 기억과 관련된 어려움이 조금 더 나타나고 있는 것으로 보입니다. 이런 모습은 생각보다 많은 사람들이 경험하는 자연스러운 패턴이며, 환경이나 스트레스에 따라 달라질 수 있습니다. 중요한 것은 “문제가 있다”기보다 지금 나에게 어떤 방식이 더 잘 맞는지를 알아가는 과정이라는 점입니다. 필요하다면 전문가와 함께 더 정확히 확인해보는 것도 도움이 될 수 있습니다`;
      } else if (hyperYes >= 6) {
        resultText =
`결과를 보면, 에너지가 많고 즉각적으로 반응하는 경향이 조금 더 나타나고 있는 것으로 보입니다. 이런 특성은 단점이라기보다 상황에 따라 강점이 될 수도 있는 부분입니다. 다만, 일상에서 조절이 필요한 순간에 어려움을 느낄 수 있습니다. 많은 사람들이 비슷한 경험을 하며, 자신에게 맞는 방법을 찾으면서 충분히 조절해 나갈 수 있습니다. 필요하다면 전문가와 함께 보다 구체적인 방향을 찾아보는 것도 도움이 될 수 있습니다.`;
      } else {
        resultText =
`결과를 보면, 현재 집중이나 행동과 관련된 부분에서 큰 어려움은 나타나지 않고 있습니다. 지금의 생활 방식과 리듬이 잘 유지되고 있는 것으로 보입니다. 지금처럼 자신에게 맞는 흐름을 유지해도 충분히 괜찮습니다.`;
      }

      document.getElementById("result").textContent = resultText;

      document.getElementById("question").style.display = "none";
      document.getElementById("buttons").style.display = "none";
      document.getElementById("progress").style.display = "none";
      document.getElementById("title").textContent = "검사 결과";
    }

    showQuestion();
  </script>

</body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ADHDQQ Test3</title>
    <link rel="stylesheet" href="/test3/test3.css?v=4" />
  </head>
  <body>
    <main id="app" class="app" role="button" tabindex="0" aria-label="test3">
      <img id="bg" class="bg" alt="" />

      <section class="hud">
        <span id="progress" class="chip">준비</span>
        <span id="status" class="chip">가운데 유지</span>
      </section>

      <section class="controls">
        <button id="start-button" class="start-button" type="button">클릭해서 시작</button>
        <button id="guide-button" class="guide-button" type="button">하는 방법 보기</button>
      </section>

      <section class="characters" aria-hidden="true">
        <img id="add-character" class="character character-add" alt="" />
        <img id="lumen-character" class="character character-lumen" alt="" />
      </section>

      <section id="arena" class="arena hidden">
        <div id="target" class="target">
          <div id="ball" class="ball"></div>
        </div>
      </section>

      <section class="hold-wrap hidden">
        <button id="hold-button" class="hold-button" type="button">가운데 유지 버튼</button>
      </section>

      <section id="tutorial" class="tutorial hidden" aria-live="polite">
        <div id="tutorial-speaker" class="tutorial-speaker"></div>
        <p id="tutorial-text" class="tutorial-text"></p>
      </section>

      <section id="result" class="result hidden">
        <h1 class="result-title">테스트 종료</h1>
        <p id="score" class="result-score"></p>
        <p id="judge" class="result-judge"></p>
        <p class="result-guide">클릭하면 다시 시작</p>
      </section>

      <div id="hint" class="hint">시작하기를 누르면 새 화면에서 검사 시작</div>
    </main>

    <script src="/test3/test3.js?v=5"></script>
  </body>
</html>
